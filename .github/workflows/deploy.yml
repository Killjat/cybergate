name: Deploy CyberGate

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 构建前端
        working-directory: frontend
        run: npm install && npm run build
        env:
          REACT_APP_API_URL: ""

      - name: 上传前端 build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "frontend/build/*"
          target: "/opt/cybergate/frontend/build"
          strip_components: 2

      - name: 部署后端
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/cybergate
            git fetch origin master
            git reset --hard origin/master
            cd /opt/cybergate/backend
            pip3 install -r requirements.txt -q
            # 创建 systemd service
            cat > /etc/systemd/system/cybergate.service << 'SVCEOF'
            [Unit]
            Description=CyberGate Backend
            After=network.target
            [Service]
            Type=simple
            WorkingDirectory=/opt/cybergate/backend
            ExecStart=/usr/bin/python3 main.py
            Restart=always
            RestartSec=3
            [Install]
            WantedBy=multi-user.target
            SVCEOF
            systemctl daemon-reload
            systemctl enable cybergate
            systemctl restart cybergate
            sleep 3
            curl -s http://localhost:8080/ || echo "starting..."
